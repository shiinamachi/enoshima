[mcp_servers.enoshima_vm]
command = "uv"
args = ["run", "--locked", "--project", "tests/vm", "enoshima-vm-mcp"]
cwd = "."
startup_timeout_sec = 30
tool_timeout_sec = 14400
enabled = true
required = false
default_tools_approval_mode = "writes"

[mcp_servers.enoshima_vm.tools.vm_status]
approval_mode = "auto"

[mcp_servers.enoshima_vm.tools.vm_query_desktop]
approval_mode = "auto"

[mcp_servers.enoshima_vm.tools.vm_list_runs]
approval_mode = "auto"

[mcp_servers.enoshima_vm.tools.vm_destroy]
approval_mode = "prompt"
