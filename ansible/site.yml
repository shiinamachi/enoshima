---
- name: Configure Arch Linux system state
  hosts: all
  gather_facts: true
  become: true

  pre_tasks:
    - name: Require Arch Linux
      ansible.builtin.assert:
        that:
          - ansible_facts.distribution == "Archlinux"
        fail_msg: This playbook supports Arch Linux only.
      tags:
        - always

    - name: Validate the Enoshima environment and capability contract
      ansible.builtin.assert:
        that:
          - enoshima_environment in ['physical', 'vm']
          - enoshima_capabilities is mapping
          - >-
            (enoshima_required_capabilities
            | difference(enoshima_capabilities.keys() | list)
            | length) == 0
        fail_msg: >-
          Every inventory host must declare the complete Enoshima capability
          map instead of relying on DMI or hardware-name detection.
      tags:
        - always

  roles:
    - role: packages
      tags:
        - packages
    - role: system
      tags:
        - system
    - role: desktop_expansion
      tags:
        - desktop-expansion
    - role: services
      vars:
        service_scope: system
      tags:
        - services

- name: Configure user-scoped state
  hosts: all
  gather_facts: false
  become: false

  roles:
    - role: user_tools
      tags:
        - user-tools
    - role: services
      vars:
        service_scope: user
      tags:
        - user-services
