---
- name: Reload systemd
  ansible.builtin.systemd_service:
    daemon_reload: true

- name: Reload TLP power policy
  ansible.builtin.systemd_service:
    name: tlp.service
    state: reloaded

- name: Run WWAN fallback policy
  ansible.builtin.systemd_service:
    name: wwan-fallback.service
    state: started

- name: Rebuild boot artifacts
  ansible.builtin.command:
    cmd: /usr/local/libexec/enoshima-rebuild-uki
  environment:
    ENOSHIMA_UKI_SECURE_BOOT_SIGNING: >-
      {{ 'true' if (secure_boot_sign_uki | bool) else 'false' }}
  when:
    - manage_boot_config | bool
    - apply_boot_artifacts | bool
  changed_when: true
  notify: Record boot artifact rebuild

- name: Record boot artifact rebuild
  ansible.builtin.copy:
    content: "managed boot inputs applied\n"
    dest: "{{ boot_artifact_state_file }}"
    owner: root
    group: root
    mode: "0644"
