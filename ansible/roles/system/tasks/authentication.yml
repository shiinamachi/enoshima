---
- name: Configure password-first fingerprint authentication for SDDM
  ansible.builtin.template:
    src: pam-sddm.j2
    dest: /etc/pam.d/sddm
    owner: root
    group: root
    mode: "0644"
    backup: true

- name: Configure password-first fingerprint authentication for sudo
  ansible.builtin.template:
    src: pam-sudo.j2
    dest: /etc/pam.d/sudo
    owner: root
    group: root
    mode: "0644"
    backup: true
