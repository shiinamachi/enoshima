---
- name: Ensure target user has the desired shell and groups
  ansible.builtin.user:
    name: "{{ target_user }}"
    shell: "{{ target_user_shell }}"
    groups: "{{ target_user_groups }}"
    append: true

- name: Configure subordinate user ID range
  ansible.builtin.lineinfile:
    path: /etc/subuid
    regexp: "^{{ target_user | regex_escape }}:"
    line: "{{ target_user }}:{{ subordinate_id_start }}:{{ subordinate_id_count }}"
    create: true
    owner: root
    group: root
    mode: "0644"
    backup: true

- name: Configure subordinate group ID range
  ansible.builtin.lineinfile:
    path: /etc/subgid
    regexp: "^{{ target_user | regex_escape }}:"
    line: "{{ target_user }}:{{ subordinate_id_start }}:{{ subordinate_id_count }}"
    create: true
    owner: root
    group: root
    mode: "0644"
    backup: true

- name: Configure hostname
  ansible.builtin.hostname:
    name: "{{ system_hostname }}"

- name: Configure hosts file
  ansible.builtin.template:
    src: hosts.j2
    dest: /etc/hosts
    owner: root
    group: root
    mode: "0644"
    backup: true

- name: Configure timezone
  community.general.timezone:
    name: "{{ system_timezone }}"

- name: Generate desired locales
  community.general.locale_gen:
    name: "{{ item }}"
    state: present
  loop: "{{ system_locales }}"

- name: Configure system locale
  ansible.builtin.template:
    src: locale.conf.j2
    dest: /etc/locale.conf
    owner: root
    group: root
    mode: "0644"
    backup: true

- name: Configure virtual console keymap
  ansible.builtin.template:
    src: vconsole.conf.j2
    dest: /etc/vconsole.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: vconsole_configuration
  notify: Rebuild boot artifacts

- name: Invalidate boot artifact record after a virtual console change
  ansible.builtin.file:
    path: "{{ boot_artifact_state_file }}"
    state: absent
  when:
    - manage_boot_config | bool
    - vconsole_configuration.changed

- name: Configure static filesystem and hibernation swap entries
  ansible.builtin.template:
    src: fstab.j2
    dest: /etc/fstab
    owner: root
    group: root
    mode: "0644"
    backup: true
  when: manage_fstab | bool

- name: Configure zram generator
  ansible.builtin.template:
    src: zram-generator.conf.j2
    dest: /etc/systemd/zram-generator.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  notify: Reload systemd

- name: Configure laptop power policy
  ansible.builtin.import_tasks: power.yml

- name: Configure service-specific authentication
  ansible.builtin.import_tasks: authentication.yml

- name: Configure local desktop integration
  ansible.builtin.import_tasks: desktop.yml

- name: Select and configure the login manager
  ansible.builtin.import_tasks: login-manager.yml

- name: Configure WWAN fallback policy
  ansible.builtin.import_tasks: network.yml

- name: Check for a Snapper root configuration
  ansible.builtin.stat:
    path: /etc/snapper/configs/root
  register: snapper_root_config
  when: snapper_configure_root | bool

- name: Create default Snapper root configuration when absent
  ansible.builtin.command:
    cmd: snapper -c root create-config /
  when:
    - snapper_configure_root | bool
    - not snapper_root_config.stat.exists
  changed_when: true

- name: Register root Snapper configuration
  ansible.builtin.template:
    src: snapper.conf.d.j2
    dest: /etc/conf.d/snapper
    owner: root
    group: root
    mode: "0644"
    backup: true
  when: snapper_configure_root | bool

- name: Configure initramfs crypttab
  ansible.builtin.template:
    src: crypttab.initramfs.j2
    dest: /etc/crypttab.initramfs
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: initramfs_crypttab_configuration
  when: manage_boot_config | bool
  notify: Rebuild boot artifacts

- name: Invalidate boot artifact record after an initramfs crypttab change
  ansible.builtin.file:
    path: "{{ boot_artifact_state_file }}"
    state: absent
  when:
    - manage_boot_config | bool
    - initramfs_crypttab_configuration.changed

- name: Configure kernel command line
  ansible.builtin.template:
    src: kernel-cmdline.j2
    dest: /etc/kernel/cmdline
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: kernel_command_line_configuration
  when:
    - manage_boot_config | bool
    - >-
      not (desktop_hibernation_enabled | bool)
      or hibernation_resume_offset.stdout is defined
  notify: Rebuild boot artifacts

- name: Invalidate boot artifact record after a kernel command line change
  ansible.builtin.file:
    path: "{{ boot_artifact_state_file }}"
    state: absent
  when:
    - manage_boot_config | bool
    - kernel_command_line_configuration.changed

- name: Configure mkinitcpio hooks
  ansible.builtin.template:
    src: mkinitcpio.conf.j2
    dest: /etc/mkinitcpio.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: mkinitcpio_configuration
  when: manage_boot_config | bool
  notify: Rebuild boot artifacts

- name: Install the transactional UKI rebuild helper
  ansible.builtin.copy:
    src: enoshima-rebuild-uki
    dest: /usr/local/libexec/enoshima-rebuild-uki
    owner: root
    group: root
    mode: "0755"
  when: manage_boot_config | bool

- name: Invalidate boot artifact record after an mkinitcpio change
  ansible.builtin.file:
    path: "{{ boot_artifact_state_file }}"
    state: absent
  when:
    - manage_boot_config | bool
    - mkinitcpio_configuration.changed

- name: Configure UKI presets
  ansible.builtin.template:
    src: mkinitcpio-preset.j2
    dest: "/etc/mkinitcpio.d/{{ item.name }}.preset"
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: uki_preset_configuration
  loop: "{{ uki_presets }}"
  when: manage_boot_config | bool
  notify: Rebuild boot artifacts

- name: Invalidate boot artifact record after a UKI preset change
  ansible.builtin.file:
    path: "{{ boot_artifact_state_file }}"
    state: absent
  when:
    - manage_boot_config | bool
    - uki_preset_configuration.changed

- name: Ensure the configuration state directory exists
  ansible.builtin.file:
    path: "{{ boot_artifact_state_file | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: manage_boot_config | bool

- name: Inspect the boot artifact application record
  ansible.builtin.stat:
    path: "{{ boot_artifact_state_file }}"
  register: boot_artifact_record
  when: manage_boot_config | bool

- name: Schedule the first explicitly requested boot artifact rebuild
  ansible.builtin.debug:
    msg: Boot artifacts have not yet been rebuilt by this configuration.
  changed_when: true
  when:
    - manage_boot_config | bool
    - apply_boot_artifacts | bool
    - not (boot_artifact_record.stat.exists | default(false))
  notify: Rebuild boot artifacts
