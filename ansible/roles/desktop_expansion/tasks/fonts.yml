---
- name: Remove the legacy Jetendard-only fontconfig preference
  ansible.builtin.file:
    path: /etc/fonts/conf.d/60-jetendard.conf
    state: absent
  notify: Refresh fontconfig cache

- name: Install the desktop fontconfig preference
  ansible.builtin.template:
    src: 60-desktop-fonts.conf.j2
    dest: /etc/fonts/conf.d/60-desktop-fonts.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  notify: Refresh fontconfig cache
