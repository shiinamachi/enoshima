---
- name: Check whether a graphical user session is active
  ansible.builtin.command:
    cmd: systemctl --user is-active graphical-session.target
  register: graphical_session_state
  changed_when: false
  failed_when: false

- name: Enable desired user units
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: true
    scope: user
    daemon_reload: true
  loop: "{{ user_units_started }}"

- name: Start desired user units in the active graphical session
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    state: started
    scope: user
  loop: "{{ user_units_started }}"
  when: graphical_session_state.rc == 0
