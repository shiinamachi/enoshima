---
- name: Enable and start desired system units
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: true
    state: started
    daemon_reload: true
  loop: "{{ system_units_started }}"

- name: Enable system unit templates without starting an unspecified instance
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: true
    daemon_reload: true
  loop: "{{ system_units_enabled_only }}"
