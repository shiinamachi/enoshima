---
system_hostname: enoshima-vm
enoshima_environment: vm
enoshima_capabilities:
  battery: false
  boot_artifacts: false
  btrfs_layout: false
  camera: false
  external_display: false
  fingerprint: false
  graphical_session: true
  hibernation: false
  root_luks: false
  secure_boot: false
  thunderbolt: false
  tpm: false
  virtual_gpu_3d: true
  vm_test_host: false
  wwan: false

manage_boot_config: false
manage_fstab: false
snapper_configure_root: false
desktop_hibernation_enabled: false
desktop_hibernation_swap_size_gib: 0
desktop_login_manager: greetd
desktop_expansion_sddm_theme_enabled: true

# The dated Arch archive is intentionally reproducible but can throttle long
# package transactions. Keep VM downloads serial and allow them to make slow
# progress without weakening the physical workstation's pacman defaults.
pacman_parallel_downloads: 1
pacman_disable_download_timeout: true

# The deterministic UI qualification fixture uses Arch's packaged Electron
# runtime. Real workstations use each managed application's bundled runtime.
additional_native_packages:
  - electron39

system_units_started:
  - NetworkManager.service
  - rtkit-daemon.service
  - systemd-timesyncd.service
  - systemd-userdbd.socket
  - remote-fs.target
  - paccache.timer

system_units_enabled_only:
  - getty@.service

# The cloud image enables networkd's wait-online unit even after the managed
# desktop switches network ownership to NetworkManager. Mask only the stale
# waiter so it cannot hold boot for two minutes and leave a failed unit behind.
system_units_masked:
  - systemd-networkd-wait-online.service

user_units_started:
  - hypridle.service
  - hyprpaper.service
  - hyprpolkitagent.service
  - swaync.service
  - waybar.service
  - wireplumber.service
  - xdg-user-dirs.service
  - p11-kit-server.socket
  - pipewire-pulse.socket
  - pipewire.socket
