---
target_user: kentakang
target_user_home: /home/kentakang
target_user_shell: /bin/zsh
target_user_groups:
  - wheel

enoshima_environment: physical
enoshima_required_capabilities:
  - battery
  - boot_artifacts
  - btrfs_layout
  - camera
  - external_display
  - fingerprint
  - graphical_session
  - hibernation
  - root_luks
  - secure_boot
  - thunderbolt
  - tpm
  - virtual_gpu_3d
  - vm_test_host
  - wwan

system_timezone: Asia/Seoul
system_locale: en_US.UTF-8
system_locales:
  - en_US.UTF-8
  - ko_KR.UTF-8
system_keymap: us

perform_full_upgrade: true
manage_pacman_config: true
pacman_parallel_downloads: 10
pacman_disable_download_timeout: false
manage_boot_config: false
manage_fstab: false
apply_boot_artifacts: false
secure_boot_sign_uki: false
boot_artifact_state_file: /var/lib/enoshima/boot-artifacts-applied
snapper_configure_root: false

# zram is part of the common workstation baseline, including disposable VM
# guests. Hardware profiles may override these values after qualification.
zram_size_expression: min(ram / 4, 8192)
zram_compression_algorithm: zstd
zram_swap_priority: 100

# Profiles may add qualification-only packages without widening the desired
# workstation package manifest. The default remains empty on physical hosts.
additional_native_packages: []

subordinate_id_start: 100000
subordinate_id_count: 65536

system_units_started: []
system_units_enabled_only: []
system_units_masked: []
user_units_started: []
wwan_modemmanager_stop_timeout: 15s
desktop_hibernation_enabled: false
desktop_hibernation_swap_size_gib: 0
desktop_hibernate_delay: 30min
desktop_hibernate_on_ac_power: false
tlp_runtime_pm_denylist: ""
tlp_usb_denylist: ""

# The selected display manager is enabled for the next boot. An explicit
# apply-now override is reserved for TTY maintenance because stopping the
# active display manager terminates every graphical session.
desktop_login_manager: sddm
desktop_login_manager_apply_now: false
sddm_scale_factor: 1.5

flatpak_user_remotes:
  - name: flathub
    url: https://dl.flathub.org/repo/flathub.flatpakrepo

flatpak_user_applications:
  - com.usebottles.bottles
