# Two-line developer prompt derived from the workstation's shared semantic
# palette. Text labels avoid private-use glyph ambiguity in fallback fonts.
format = """
[╭─](bold focus)\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$fill\
$nodejs\
$python\
$golang\
$rust\
$cmd_duration\
$status\
$jobs\
$time\
$line_break\
[╰─](bold focus)$character"""

add_newline = true
palette = "cyberpunk_library"
scan_timeout = 10
command_timeout = 300
follow_symlinks = false

[palettes.cyberpunk_library]
canvas = "#050623"
surface = "#0A0C3E"
raised = "#161151"
focus = "#62D8FF"
selection = "#9A5CFF"
accent = "#E56BFF"
text = "#F2ECFF"
muted = "#C9BFE8"
info = "#6D8CFF"
success = "#77E0C6"
warning = "#FFB86B"
critical = "#FF5D8F"

[username]
format = "[$user](bold accent)@"
show_always = false

[hostname]
format = "[$hostname](bold info) "
ssh_only = true
trim_at = "."

[directory]
format = "[ $path ]($style)[$read_only]($read_only_style)"
style = "bold focus"
read_only = " RO"
read_only_style = "bold critical"
truncation_length = 4
truncation_symbol = "…/"
home_symbol = "~"

[git_branch]
format = "[ $symbol$branch(:$remote_branch) ]($style)"
symbol = "GIT "
style = "bold selection"

[git_status]
format = "[ $all_status$ahead_behind]($style)"
style = "bold accent"
conflicted = "≠${count} "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕${ahead_count}/${behind_count} "
untracked = "?${count} "
stashed = "*${count} "
modified = "!${count} "
staged = "+${count} "
renamed = "»${count} "
deleted = "×${count} "

[fill]
symbol = "·"
style = "raised"

[nodejs]
format = "[ NODE $version ]($style)"
style = "bold success"
version_format = "v${major}.${minor}"

[python]
format = '[ PY $version( \($virtualenv\)) ]($style)'
style = "bold warning"
version_format = "v${major}.${minor}"

[golang]
format = "[ GO $version ]($style)"
style = "bold info"
version_format = "v${major}.${minor}"

[rust]
format = "[ RS $version ]($style)"
style = "bold critical"
version_format = "v${major}.${minor}"

[cmd_duration]
format = "[ $duration ]($style)"
style = "warning"
min_time = 2000
show_milliseconds = false

[status]
format = "[$symbol$status ]($style)"
style = "bold critical"
symbol = "ERR "
not_executable_symbol = "NOEXEC "
not_found_symbol = "NOTFOUND "
sigint_symbol = "INT "
signal_symbol = "SIG "
disabled = false

[jobs]
format = "[ JOBS $number ]($style)"
style = "bold warning"
number_threshold = 1

[time]
format = "[ $time ]($style)"
style = "muted"
time_format = "%H:%M"
disabled = false

[character]
success_symbol = "[❯](bold success) "
error_symbol = "[❯](bold critical) "
vimcmd_symbol = "[❮](bold selection) "

# This module reports `mise doctor` health rather than selected tool versions.
# The contextual language modules above are faster and more useful per prompt.
[mise]
disabled = true
