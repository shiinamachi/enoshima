$font = Pretendard
$wallpaper16x9 = /home/kentakang/.local/share/backgrounds/cyberpunk-library-16x9.jpg
$wallpaper16x10 = /home/kentakang/.local/share/backgrounds/cyberpunk-library-16x10.jpg

general {
    hide_cursor = true
    immediate_render = true
    fractional_scaling = 2
    fail_timeout = 3000
}

auth {
    pam {
        enabled = true
    }

    fingerprint {
        enabled = true
        ready_message = Scan fingerprint or enter password
        present_message = Scanning fingerprint...
        retry_delay = 250
    }
}

animations {
    enabled = true
    bezier = easeOut, 0.23, 1, 0.32, 1
    animation = fadeIn, 1, 1.8, easeOut
    animation = fadeOut, 1, 1.4, easeOut
    animation = inputFieldDots, 1, 1.5, easeOut
}

background {
    monitor = eDP-1
    path = $wallpaper16x10
    zindex = -1
    color = rgba(5, 6, 35, 1.0)
    blur_passes = 1
    blur_size = 3
    brightness = 0.62
    vibrancy = 0.14
}

background {
    monitor =
    path = $wallpaper16x9
    zindex = -2
    color = rgba(5, 6, 35, 1.0)
    blur_passes = 1
    blur_size = 3
    brightness = 0.62
    vibrancy = 0.14
}

shape {
    monitor =
    # Outline Frame is shared with the boot greeter: 420px content inside a
    # centered 24px frame, with every authentication control >=44px.
    size = 468, 560
    color = rgba(10, 12, 62, 0.94)
    rounding = 14
    border_size = 2
    border_color = rgba(154, 92, 255, 0.88)
    position = 0, 0
    halign = center
    valign = center
}

label {
    monitor =
    text = ENOSHIMA // 잠금 해제
    color = rgba(154, 92, 255, 1.0)
    font_size = 13
    font_family = $font
    position = 0, 264
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:10000] enoshima-auth-status summary
    color = rgba(201, 191, 232, 0.88)
    font_size = 12
    font_family = $font
    position = 0, 232
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgba(242, 236, 255, 1.0)
    font_size = 64
    font_family = $font
    position = 0, 164
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    color = rgba(201, 191, 232, 0.88)
    font_size = 16
    font_family = $font
    position = 0, 112
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = rgba(242, 236, 255, 1.0)
    font_size = 15
    font_family = $font
    position = 0, 66
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 420, 58
    outline_thickness = 2
    outer_color = rgba(98, 216, 255, 1.0) rgba(154, 92, 255, 1.0) 45deg
    inner_color = rgba(22, 17, 81, 0.94)
    font_color = rgba(242, 236, 255, 1.0)
    check_color = rgba(119, 224, 198, 1.0)
    fail_color = rgba(255, 93, 143, 1.0)
    capslock_color = rgba(255, 184, 107, 1.0)
    numlock_color = rgba(229, 107, 255, 1.0)
    font_family = $font
    placeholder_text = Password or fingerprint
    fail_text = $FAIL
    fade_on_empty = false
    rounding = 12
    dots_spacing = 0.25
    position = 0, 10
    halign = center
    valign = center
}

shape {
    monitor =
    size = 420, 52
    color = rgba(22, 17, 81, 0.76)
    rounding = 12
    border_size = 1
    border_color = rgba(154, 92, 255, 0.48)
    position = 0, -62
    halign = center
    valign = center
}

label {
    monitor =
    text = ◎  $FPRINTMESSAGE
    color = rgba(201, 191, 232, 0.84)
    font_size = 13
    font_family = $font
    position = 0, -62
    halign = center
    valign = center
}

shape {
    monitor =
    size = 420, 48
    color = rgba(101, 65, 184, 1.0)
    rounding = 12
    border_size = 1
    border_color = rgba(98, 216, 255, 0.46)
    position = 0, -132
    halign = center
    valign = center
}

label {
    monitor =
    text = Enter  ·  잠금 해제
    color = rgba(242, 236, 255, 1.0)
    font_size = 14
    font_family = $font
    position = 0, -132
    halign = center
    valign = center
}
