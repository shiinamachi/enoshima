$font = Pretendard
$wallpaper = /home/kentakang/.local/share/backgrounds/cyberpunk-city.png

general {
    hide_cursor = true
    immediate_render = true
    fail_timeout = 1500
}

auth {
    pam {
        enabled = true
    }

    fingerprint {
        enabled = true
        ready_message = Scan fingerprint or enter password
        present_message = Scanning fingerprint...
        retry_delay = 250
    }
}

animations {
    enabled = true
    bezier = easeOut, 0.23, 1, 0.32, 1
    animation = fadeIn, 1, 5, easeOut
    animation = fadeOut, 1, 4, easeOut
    animation = inputFieldDots, 1, 2, easeOut
}

background {
    monitor =
    path = $wallpaper
    color = rgba(7, 11, 42, 1.0)
    blur_passes = 2
    blur_size = 5
    brightness = 0.52
    vibrancy = 0.18
}

label {
    monitor =
    text = SESSION LOCKED
    color = rgba(51, 214, 255, 1.0)
    font_size = 13
    font_family = $font
    position = 114, 350
    halign = left
    valign = bottom
}

label {
    monitor =
    text = $TIME
    color = rgba(233, 232, 255, 1.0)
    font_size = 72
    font_family = $font
    position = 108, 250
    halign = left
    valign = bottom
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    color = rgba(233, 232, 255, 0.82)
    font_size = 18
    font_family = $font
    position = 114, 214
    halign = left
    valign = bottom
}

input-field {
    monitor =
    size = 440, 64
    outline_thickness = 2
    outer_color = rgba(51, 214, 255, 1.0)
    inner_color = rgba(17, 20, 71, 0.90)
    font_color = rgba(233, 232, 255, 1.0)
    check_color = rgba(139, 92, 255, 1.0)
    fail_color = rgba(255, 66, 109, 1.0)
    font_family = $font
    placeholder_text = <i>Password or fingerprint</i>
    fail_text = $PAMFAIL
    rounding = 16
    dots_spacing = 0.25
    position = 110, 120
    halign = left
    valign = bottom
}
