$font = Pretendard
$wallpaper16x9 = /home/kentakang/.local/share/backgrounds/cyberpunk-library-16x9.jpg
$wallpaper16x10 = /home/kentakang/.local/share/backgrounds/cyberpunk-library-16x10.jpg

general {
    hide_cursor = true
    immediate_render = true
    fail_timeout = 1500
}

auth {
    pam {
        enabled = true
    }

    fingerprint {
        enabled = true
        ready_message = Scan fingerprint or enter password
        present_message = Scanning fingerprint...
        retry_delay = 250
    }
}

animations {
    enabled = true
    bezier = easeOut, 0.23, 1, 0.32, 1
    animation = fadeIn, 1, 5, easeOut
    animation = fadeOut, 1, 4, easeOut
    animation = inputFieldDots, 1, 2, easeOut
}

background {
    monitor = eDP-1
    path = $wallpaper16x10
    color = rgba(5, 6, 35, 1.0)
    blur_passes = 1
    blur_size = 3
    brightness = 0.62
    vibrancy = 0.14
}

background {
    monitor =
    path = $wallpaper16x9
    color = rgba(5, 6, 35, 1.0)
    blur_passes = 1
    blur_size = 3
    brightness = 0.62
    vibrancy = 0.14
}

shape {
    monitor =
    size = 600, 360
    color = rgba(10, 12, 62, 0.88)
    rounding = 22
    border_size = 2
    border_color = rgba(98, 216, 255, 0.78)
    position = 84, 72
    halign = left
    valign = bottom
}

label {
    monitor =
    text = SHIINAMACHI // SESSION LOCKED
    color = rgba(98, 216, 255, 1.0)
    font_size = 13
    font_family = $font
    position = 114, 394
    halign = left
    valign = bottom
}

label {
    monitor =
    text = $TIME
    color = rgba(242, 236, 255, 1.0)
    font_size = 72
    font_family = $font
    position = 108, 286
    halign = left
    valign = bottom
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    color = rgba(201, 191, 232, 0.88)
    font_size = 18
    font_family = $font
    position = 114, 246
    halign = left
    valign = bottom
}

input-field {
    monitor =
    size = 532, 64
    outline_thickness = 2
    outer_color = rgba(98, 216, 255, 1.0) rgba(154, 92, 255, 1.0) rgba(229, 107, 255, 1.0) 45deg
    inner_color = rgba(22, 17, 81, 0.94)
    font_color = rgba(242, 236, 255, 1.0)
    check_color = rgba(119, 224, 198, 1.0)
    fail_color = rgba(255, 93, 143, 1.0)
    capslock_color = rgba(255, 184, 107, 1.0)
    numlock_color = rgba(229, 107, 255, 1.0)
    font_family = $font
    placeholder_text = <i>Password or fingerprint</i>
    fail_text = $PAMFAIL
    rounding = 16
    dots_spacing = 0.25
    position = 118, 138
    halign = left
    valign = bottom
}

label {
    monitor =
    text = ◉  Fingerprint reader ready
    color = rgba(201, 191, 232, 0.84)
    font_size = 14
    font_family = $font
    position = 122, 88
    halign = left
    valign = bottom
}
