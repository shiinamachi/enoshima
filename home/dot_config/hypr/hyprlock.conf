$font = JetBrainsMono Nerd Font

general {
    hide_cursor = true
    immediate_render = true
    fail_timeout = 1500
}

auth {
    pam {
        enabled = true
    }

    fingerprint {
        enabled = true
        ready_message = Scan fingerprint or enter password
        present_message = Scanning fingerprint...
        retry_delay = 250
    }
}

animations {
    enabled = true
    bezier = easeOut, 0.23, 1, 0.32, 1
    animation = fadeIn, 1, 5, easeOut
    animation = fadeOut, 1, 4, easeOut
    animation = inputFieldDots, 1, 2, easeOut
}

background {
    monitor =
    path = screenshot
    color = rgba(17, 17, 27, 1.0)
    blur_passes = 3
    blur_size = 7
    brightness = 0.55
    vibrancy = 0.12
}

label {
    monitor =
    text = $TIME
    color = rgba(205, 214, 244, 1.0)
    font_size = 72
    font_family = $font
    position = 0, 145
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    color = rgba(166, 173, 200, 1.0)
    font_size = 18
    font_family = $font
    position = 0, 82
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 420, 64
    outline_thickness = 3
    outer_color = rgba(137, 180, 250, 1.0)
    inner_color = rgba(30, 30, 46, 0.88)
    font_color = rgba(205, 214, 244, 1.0)
    check_color = rgba(166, 227, 161, 1.0)
    fail_color = rgba(243, 139, 168, 1.0)
    font_family = $font
    placeholder_text = <i>Password or fingerprint</i>
    fail_text = $PAMFAIL
    rounding = 18
    dots_spacing = 0.25
    position = 0, -70
    halign = center
    valign = center
}
