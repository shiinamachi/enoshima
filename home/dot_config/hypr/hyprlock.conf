general {
    hide_cursor = true
    immediate_render = true
}

auth {
    pam:enabled = true
    fingerprint:enabled = false
}

background {
    monitor =
    path = screenshot
    color = rgba(30, 30, 46, 1.0)
    blur_passes = 3
    blur_size = 7
    brightness = 0.65
}

label {
    monitor =
    text = $TIME
    color = rgba(205, 214, 244, 1.0)
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 360, 60
    outline_thickness = 3
    outer_color = rgba(137, 180, 250, 1.0)
    inner_color = rgba(30, 30, 46, 0.85)
    font_color = rgba(205, 214, 244, 1.0)
    placeholder_text = <i>Input Password...</i>
    rounding = -1
    position = 0, -80
    halign = center
    valign = center
}
