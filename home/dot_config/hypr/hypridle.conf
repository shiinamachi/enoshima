general {
    lock_cmd = pidof hyprlock >/dev/null || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })'
}

# Lock after five minutes of inactivity.
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# Keep the lock screen active before powering displays down.
listener {
    timeout = 600
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({ action = "disable" })'
    on-resume = hyprctl dispatch 'hl.dsp.dpms({ action = "enable" })'
}

# Enter suspend-then-hibernate after thirty minutes only while running on
# battery. Lid events are owned exclusively by systemd-logind.
listener {
    timeout = 1800
    on-timeout = sh -c 'if [ -x /usr/bin/systemd-ac-power ] && ! /usr/bin/systemd-ac-power; then /usr/bin/systemctl suspend-then-hibernate; fi'
}
