schema: 1
surface: auth
card:
  content_width: 420
  frame_width: 468
  frame_height: 560
  padding: 24
  spacing: 12
controls:
  field_height: 44
  primary_height: 48
  radius: 12
  focus_width: 2
sections:
  - status
  - clock
  - identity
  - credential
  - authentication-status
  - primary-action
  - boot-power-actions
authentication:
  policy: serialized
  default: password
  fingerprint:
    cancel_on_password_submit: true
    states: [ready, progress, success, failure, timeout]
outputs:
  primary:
    default_connector: eDP-1
    owns: [credential, focus, error, fingerprint, power-actions]
  secondary:
    owns: [wallpaper, clock, network, battery]
locales: [en-US, ko-KR]
keyboard_layouts:
  - id: en-US
    xkb_layout: us
    xkb_variant: ""
    xkb_options: []
    label: English (US)
  - id: ko-KR
    xkb_layout: kr
    xkb_variant: ""
    xkb_options: []
    label: 한국어 (Korean)
