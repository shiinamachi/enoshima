selection: >-
  Direction B, Grid Card Panel, makes the four spatial display relationships
  scannable while preserving the current 2x2 keyboard navigation model.
states: [default, hover, focus, selected, unavailable, applying, confirmation, error]
invariants:
  - Modal width is 620px with four 280x100px mode cards and 10px gaps.
  - Selection includes a check or layout cue in addition to violet color.
  - Confirmation offers revert and keep actions for 15 seconds.
