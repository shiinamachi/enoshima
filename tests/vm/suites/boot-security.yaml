---
name: boot-security
base_image: arch-cloud-reproducible
domain_template: domain-secure-boot.xml.j2
profile: enoshima-vm-boot
timeout_minutes: 330
resources:
  vcpus: 6
  memory_mib: 12288
  disk_gib: 96
network:
  mode: isolated-user
  allow_inbound_from_host: true
  allow_lan: false
steps:
  - wait_for_ssh
  - wait_for_cloud_init
  - wait_for_guest_agent
  - upload_worktree
  - prepare_boot_disk
  - boot_with_recovery
  - upload_worktree
  - seed_codex_electron_cache
  - create_runtime_inventory
  - assert_secure_boot
  - enroll_tpm
  - reboot
  - run_validate
  - run_bootstrap:
      report: first
      inventory: runtime
      apply_boot_artifacts: true
  - run_postflight:
      report: boot-security
      inventory: runtime
  - assert_expected_skips
  - assert_secure_boot
  - test_recovery_path
  - reboot
  - assert_secure_boot
  - test_unsigned_rejection
  - collect_boot_security
  - collect_artifacts
allowed_skips:
  - battery-charge-threshold
  - camera-device
  - external-display
  - fingerprint-device
  - fingerprint-enrollment
  - thunderbolt-controller
  - wwan-modem
fail_on_unexpected_skip: true
