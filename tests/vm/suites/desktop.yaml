---
name: desktop
base_image: arch-cloud-reproducible
domain_template: domain-desktop.xml.j2
profile: enoshima-vm
timeout_minutes: 300
resources:
  vcpus: 6
  memory_mib: 12288
  disk_gib: 96
network:
  mode: isolated-user
  allow_inbound_from_host: true
  allow_lan: false
steps:
  - wait_for_ssh
  - wait_for_cloud_init
  - wait_for_guest_agent
  - upload_worktree
  - seed_codex_electron_cache
  - run_validate
  - run_bootstrap:
      report: first
  - prepare_login
  - reboot
  - login_greetd
  - configure_virtual_displays:
      disable_unlisted: true
      monitors:
        - name: HEADLESS-INTERNAL
          mode: 2880x1800@60
          position: "0x0"
          scale: 1.5
        - name: HEADLESS-EXTERNAL
          mode: 2560x1440@60
          position: "1920x0"
          scale: 1.0
  - send_key:
      keys: [KEY_LEFTMETA, KEY_ENTER]
  - wait_for_client:
      class: "^(com\\.mitchellh\\.ghostty|ghostty)$"
      workspace: "1"
      timeout_seconds: 120
  - send_key:
      keys: [KEY_LEFTMETA, KEY_2]
  - assert_desktop_state:
      active_workspace: "2"
      require_keyboard: true
      monitor_count: 2
      monitors:
        - name: HEADLESS-INTERNAL
          width: 2880
          height: 1800
          x: 0
          y: 0
          scale: 1.5
        - name: HEADLESS-EXTERNAL
          width: 2560
          height: 1440
          x: 1920
          y: 0
          scale: 1.0
  - query_desktop
  - screenshot:
      name: desktop
  - send_key:
      keys: [KEY_LEFTMETA, KEY_SPACE]
  - wait_for_layer:
      namespace: cyberlauncher
      timeout_seconds: 60
  - screenshot:
      name: launcher
  - send_key:
      keys: [KEY_ESC]
  - run_electron_qualification:
      iterations: 20
  - run_postflight:
      report: desktop
  - assert_graphical_health:
      settle_seconds: 310
      required_user_units:
        - app-discord@autostart.service
        - app-slack@autostart.service
  - assert_expected_skips
  - collect_artifacts
allowed_skips:
  - battery-charge-threshold
  - boot-artifacts
  - btrfs-layout
  - camera-device
  - external-display
  - fingerprint-device
  - fingerprint-enrollment
  - hibernation
  - root-luks
  - secure-boot
  - thunderbolt-controller
  - tpm-unlock
  - wwan-modem
fail_on_unexpected_skip: true
