---
name: desktop
base_image: arch-cloud-reproducible
domain_template: domain-desktop.xml.j2
profile: enoshima-vm
timeout_minutes: 300
resources:
  vcpus: 6
  memory_mib: 12288
  disk_gib: 96
network:
  mode: isolated-user
  allow_inbound_from_host: true
  allow_lan: false
steps:
  - wait_for_ssh
  - wait_for_cloud_init
  - wait_for_guest_agent
  - upload_worktree
  - run_validate
  - run_bootstrap:
      report: first
  - reboot
  - start_desktop
  - send_key:
      keys: [KEY_LEFTMETA, KEY_ENTER]
  - query_desktop
  - screenshot:
      name: desktop
  - run_postflight:
      report: desktop
  - assert_expected_skips
  - collect_artifacts
allowed_skips:
  - battery-charge-threshold
  - boot-artifacts
  - camera-device
  - external-display
  - fingerprint-device
  - fingerprint-enrollment
  - hibernation
  - secure-boot
  - thunderbolt-controller
  - tpm-unlock
  - wwan-modem
fail_on_unexpected_skip: true
