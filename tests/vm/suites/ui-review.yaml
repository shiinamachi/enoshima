---
name: ui-review
base_image: arch-cloud-reproducible
domain_template: domain-desktop.xml.j2
profile: enoshima-vm
timeout_minutes: 360
resources:
  vcpus: 6
  memory_mib: 12288
  disk_gib: 96
network:
  mode: isolated-user
  allow_inbound_from_host: true
  allow_lan: false
steps:
  - wait_for_ssh
  - wait_for_cloud_init
  - wait_for_guest_agent
  - upload_worktree
  - seed_codex_electron_cache
  - run_validate
  - run_bootstrap:
      report: first
  - prepare_login
  - reboot
  - login_greetd
  - run_ui_review:
      surfaces:
        - auth
        - desktop-shell
        - launcher
        - notification-center
        - power-menu
        - osd
        - display-mode
        - cyberdock-window-state
        - snap-assist
        - system-titlebar
  - run_postflight:
      report: ui-review
  - assert_graphical_health
  - assert_expected_skips
  - collect_artifacts
allowed_skips:
  - battery-charge-threshold
  - boot-artifacts
  - btrfs-layout
  - camera-device
  - external-display
  - fingerprint-device
  - fingerprint-enrollment
  - hibernation
  - root-luks
  - secure-boot
  - thunderbolt-controller
  - tpm-unlock
  - wwan-modem
fail_on_unexpected_skip: true
