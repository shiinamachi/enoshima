---
name: reboot
base_image: arch-cloud-reproducible
domain_template: domain-desktop.xml.j2
profile: enoshima-vm
timeout_minutes: 180
resources:
  vcpus: 6
  memory_mib: 12288
  disk_gib: 64
network:
  mode: isolated-user
  allow_inbound_from_host: true
  allow_lan: false
steps:
  - wait_for_ssh
  - wait_for_cloud_init
  - wait_for_guest_agent
  - upload_worktree
  - seed_codex_electron_cache
  - run_validate
  - run_bootstrap:
      report: first
  - prepare_login
  - reboot
  - login_greetd
  - reboot_via_desktop_power:
      iterations: 10
  - run_postflight:
      report: after-reboot
  - assert_graphical_health:
      settle_seconds: 310
      required_user_units:
        - app-discord@autostart.service
        - app-slack@autostart.service
  - assert_expected_skips
  - collect_artifacts
allowed_skips:
  - battery-charge-threshold
  - boot-artifacts
  - btrfs-layout
  - camera-device
  - external-display
  - fingerprint-device
  - fingerprint-enrollment
  - hibernation
  - root-luks
  - secure-boot
  - thunderbolt-controller
  - tpm-unlock
  - wwan-modem
fail_on_unexpected_skip: true
